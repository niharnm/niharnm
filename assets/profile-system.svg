<svg width="1200" height="410" viewBox="0 0 1200 410" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile system</title>
  <desc id="desc">A local dark profile panel listing Nihar's build principles and tools.</desc>
  <defs>
    <linearGradient id="surface" x1="70" y1="36" x2="1130" y2="374" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111111"/>
      <stop offset=".52" stop-color="#151515"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <pattern id="grid" width="78" height="78" patternUnits="userSpaceOnUse">
      <path d="M78 0H0V78" stroke="#f4f4f1" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="32" y="10" width="1136" height="384" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect width="1200" height="410" fill="#080808"/>
  <rect width="1200" height="410" fill="url(#grid)"/>
  <g filter="url(#shadow)">
    <rect x="70" y="36" width="1060" height="338" rx="20" fill="url(#surface)" stroke="#f4f4f1" stroke-opacity=".14"/>
  </g>
  <text x="112" y="92" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="3">OPERATING SYSTEM</text>
  <text x="112" y="132" fill="#f4f4f1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="850">Build, experiment, polish.</text>
  <text x="112" y="166" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">A compact map of how I like to work and what I keep learning.</text>

  <g>
    <rect x="112" y="210" width="300" height="106" rx="14" fill="#f4f4f1" fill-opacity=".055" stroke="#f4f4f1" stroke-opacity=".13"/>
    <text x="136" y="248" fill="#f4f4f1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800">Build</text>
    <text x="136" y="279" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Turn rough ideas into useful,</text>
    <text x="136" y="301" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">working products.</text>

    <rect x="450" y="210" width="300" height="106" rx="14" fill="#f4f4f1" fill-opacity=".055" stroke="#f4f4f1" stroke-opacity=".13"/>
    <text x="474" y="248" fill="#f4f4f1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800">Experiment</text>
    <text x="474" y="279" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Work with robotics, AI, data,</text>
    <text x="474" y="301" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">and responsive systems.</text>

    <rect x="788" y="210" width="300" height="106" rx="14" fill="#f4f4f1" fill-opacity=".055" stroke="#f4f4f1" stroke-opacity=".13"/>
    <text x="812" y="248" fill="#f4f4f1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800">Polish</text>
    <text x="812" y="279" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Care about clean interfaces,</text>
    <text x="812" y="301" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">readable code, and strong demos.</text>
  </g>

  <g>
    <rect x="112" y="338" width="82" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="153" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">Swift</text>
    <rect x="204" y="338" width="88" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="248" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">C++</text>
    <rect x="302" y="338" width="112" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="358" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">TypeScript</text>
    <rect x="424" y="338" width="86" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="467" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">React</text>
    <rect x="520" y="338" width="92" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="566" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">SwiftUI</text>
    <rect x="622" y="338" width="108" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="676" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">Robotics</text>
    <rect x="740" y="338" width="98" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="789" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">Vercel</text>
    <rect x="848" y="338" width="86" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="891" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">Figma</text>
    <rect x="944" y="338" width="92" height="32" rx="16" fill="#d8d8d2" fill-opacity=".09" stroke="#d8d8d2" stroke-opacity=".18"/>
    <text x="990" y="359" text-anchor="middle" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800">Onshape</text>
  </g>
</svg>
