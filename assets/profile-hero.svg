<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nihar Manchikalapudi</title>
  <desc id="desc">A dark portfolio-style hero card inspired by niharm.me.</desc>
  <defs>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(246 82) rotate(51) scale(430 260)">
      <stop stop-color="#f4f4f1" stop-opacity=".16"/>
      <stop offset="1" stop-color="#f4f4f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 144) rotate(116) scale(360 290)">
      <stop stop-color="#8e918f" stop-opacity=".24"/>
      <stop offset="1" stop-color="#8e918f" stop-opacity="0"/>
