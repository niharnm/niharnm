      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="0" fill="#080808"/>
  <rect width="1200" height="560" fill="url(#glowA)"/>
  <rect width="1200" height="560" fill="url(#glowB)"/>
  <rect width="1200" height="560" fill="url(#grid)"/>

