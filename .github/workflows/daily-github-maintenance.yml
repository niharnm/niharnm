name: Daily GitHub Maintenance

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are UTC. These two entries cover 9 AM America/Los_Angeles
    # during daylight and standard time; the gate step below runs only the right one.
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

concurrency:
  group: daily-github-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TZ: America/Los_Angeles
      GH_AUTOMATION_TOKEN: ${{ secrets.GH_AUTOMATION_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_MODELS_TOKEN: ${{ github.token }}
      GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL }}
      TARGET_REPOS: ${{ vars.TARGET_REPOS }}
      ALLOW_DIRECT_COMMITS: ${{ vars.ALLOW_DIRECT_COMMITS }}
      MAX_DAILY_CHANGES: ${{ vars.MAX_DAILY_CHANGES }}
      ALLOW_PROJECT_FALLBACK: ${{ vars.ALLOW_PROJECT_FALLBACK }}
      PROJECT_FALLBACK_REPO: ${{ vars.PROJECT_FALLBACK_REPO }}

    steps:
      - name: Gate duplicate UTC schedules
        id: gate
        shell: bash
        env:
          TRIGGER_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          expected_schedule="$(python3 -c 'from datetime import datetime, time; from zoneinfo import ZoneInfo; p=ZoneInfo("America/Los_Angeles"); u=ZoneInfo("UTC"); d=datetime.now(p).date(); h=datetime.combine(d, time(9, 0), p).astimezone(u).hour; print(f"0 {h} * * *")')"

          if [ "${TRIGGER_SCHEDULE}" = "${expected_schedule}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping ${TRIGGER_SCHEDULE}; today's 9 AM Pacific schedule is ${expected_schedule}."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout automation host
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve runtime configuration
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TARGET_REPOS:-}" ]; then
            TARGET_REPOS="$(awk 'NF && $1 !~ /^#/ {print $0}' .github/automation/targets.txt | paste -sd, -)"
          fi
          if [ -z "${TARGET_REPOS:-}" ]; then
            echo "No target repositories configured." >&2
            exit 1
          fi

          MODEL="${GITHUB_MODELS_MODEL:-openai/gpt-4.1-mini}"
          DIRECT_COMMITS="${ALLOW_DIRECT_COMMITS:-true}"
          MAX_CHANGES="${MAX_DAILY_CHANGES:-3}"
          FALLBACK_ENABLED="${ALLOW_PROJECT_FALLBACK:-true}"
          FALLBACK_REPO="${PROJECT_FALLBACK_REPO:-niharnm/trend-build-lab}"
          WRITE_TOKEN="${GH_AUTOMATION_TOKEN:-${GITHUB_TOKEN:-}}"
          MODELS_TOKEN="${GITHUB_MODELS_TOKEN:-${GITHUB_TOKEN:-}}"

          if [ -z "${MODELS_TOKEN:-}" ]; then
            echo "Missing GitHub Models token." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [ -z "${WRITE_TOKEN:-}" ]; then
            echo "Missing GitHub write token." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "::add-mask::${WRITE_TOKEN}"
          echo "::add-mask::${MODELS_TOKEN}"
          echo "TARGET_REPOS=${TARGET_REPOS}" >> "$GITHUB_ENV"
          echo "GITHUB_MODELS_MODEL=${MODEL}" >> "$GITHUB_ENV"
          echo "ALLOW_DIRECT_COMMITS=${DIRECT_COMMITS}" >> "$GITHUB_ENV"
          echo "MAX_DAILY_CHANGES=${MAX_CHANGES}" >> "$GITHUB_ENV"
          echo "ALLOW_PROJECT_FALLBACK=${FALLBACK_ENABLED}" >> "$GITHUB_ENV"
          echo "PROJECT_FALLBACK_REPO=${FALLBACK_REPO}" >> "$GITHUB_ENV"
          echo "GH_TOKEN=${WRITE_TOKEN}" >> "$GITHUB_ENV"
          echo "GITHUB_MODELS_TOKEN=${MODELS_TOKEN}" >> "$GITHUB_ENV"
          echo "Using target repositories: ${TARGET_REPOS}"
          echo "Using GitHub Models model: ${MODEL}"
          echo "Max daily useful changes: ${MAX_CHANGES}"
          echo "Project fallback: ${FALLBACK_ENABLED} (${FALLBACK_REPO})"

      - name: Set up Node.js
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure git and GitHub auth
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "Nihar Manchikalapudi"
          git config --global user.email "117209695+niharnm@users.noreply.github.com"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          if gh auth status --hostname github.com >/dev/null 2>&1; then
            echo "GitHub CLI authentication configured."
          else
            echo "GitHub CLI authentication check failed; continuing because git auth is configured."
          fi

      - name: Run GitHub Models maintenance
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        env:
          GITHUB_MODELS_RESULT_FILE: ${{ runner.temp }}/daily-maintenance-result.md
        run: |
          set -euo pipefail
          node .github/automation/github-models-maintenance.mjs | tee "$RUNNER_TEMP/github-models-maintenance.log"

      - name: Upload maintenance logs
        if: always() && steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-github-maintenance-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/daily-maintenance-result.md
            ${{ runner.temp }}/github-models-maintenance.log
          if-no-files-found: ignore
