<svg width="1200" height="76" viewBox="0 0 1200 76" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Animated role line</title>
  <rect width="1200" height="76" rx="12" fill="#080808"/>
  <rect x="1" y="1" width="1198" height="74" rx="11" stroke="#f4f4f1" stroke-opacity=".12"/>
  <style>
    .line { font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; fill: #d8d8d2; opacity: 0; }
    .l1 { animation: show 9s infinite; }
    .l2 { animation: show 9s infinite 3s; }
    .l3 { animation: show 9s infinite 6s; }
    @keyframes show { 0%{opacity:0} 8%{opacity:1} 28%{opacity:1} 36%{opacity:0} 100%{opacity:0} }
  </style>
  <text x="600" y="47" text-anchor="middle" class="line l1">building useful software around school, automation, and engineering</text>
  <text x="600" y="47" text-anchor="middle" class="line l2">exploring robotics, data, AI, and product design</text>
  <text x="600" y="47" text-anchor="middle" class="line l3">turning ambitious ideas into demos that actually run</text>
</svg>
