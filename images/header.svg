<svg width="1200" height="270" viewBox="0 0 1200 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nihar Manchikalapudi</title>
  <desc id="desc">Dark portfolio header matching niharm.me.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080808"/>
      <stop offset=".56" stop-color="#111111"/>
      <stop offset="1" stop-color="#181818"/>
    </linearGradient>
    <radialGradient id="soft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(242 46) rotate(42) scale(420 210)">
      <stop stop-color="#f4f4f1" stop-opacity=".14"/>
      <stop offset="1" stop-color="#f4f4f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="78" height="78" patternUnits="userSpaceOnUse">
      <path d="M78 0H0V78" stroke="#f4f4f1" stroke-opacity=".055"/>
    </pattern>
    <filter id="shadow" x="-20" y="-30" width="1240" height="330" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".38"/>
    </filter>
    <style>
      @keyframes rail { 0%,100% { opacity:.25; transform: translateX(0); } 50% { opacity:.65; transform: translateX(20px); } }
      @keyframes orbit { to { transform: rotate(360deg); } }
      .rail { animation: rail 6s ease-in-out infinite; transform-origin: center; }
      .ring { animation: orbit 20s linear infinite; transform-origin: 985px 135px; }
    </style>
  </defs>
  <rect width="1200" height="270" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="270" rx="18" fill="url(#soft)"/>
  <rect width="1200" height="270" rx="18" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="268" rx="17" stroke="#f4f4f1" stroke-opacity=".14"/>

  <g filter="url(#shadow)">
    <rect x="56" y="50" width="44" height="44" rx="22" fill="#080808" stroke="#f4f4f1" stroke-opacity=".38"/>
    <text x="72" y="70" fill="#f4f4f1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="900">N</text>
    <text x="82" y="84" fill="#f4f4f1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="900">M</text>
    <text x="56" y="133" fill="#a7a7a1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="3">STUDENT BUILDER</text>
    <text x="56" y="188" fill="#f4f4f1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="58" font-weight="850" letter-spacing="-1.1">Nihar Manchikalapudi</text>
    <text x="58" y="225" fill="#d8d8d2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="600">apps, robotics tools, Mac software, and practical data projects</text>
  </g>

  <g class="ring" opacity=".75">
    <circle cx="985" cy="135" r="92" stroke="#f4f4f1" stroke-opacity=".14"/>
    <circle cx="985" cy="135" r="58" stroke="#f4f4f1" stroke-opacity=".18"/>
    <path d="M893 135H1077" stroke="#f4f4f1" stroke-opacity=".08"/>
    <path d="M985 43V227" stroke="#f4f4f1" stroke-opacity=".08"/>
    <circle cx="985" cy="43" r="5" fill="#d8d8d2"/>
  </g>
  <g class="rail">
    <path d="M842 217H1128" stroke="#f4f4f1" stroke-opacity=".22"/>
    <path d="M902 235H1088" stroke="#f4f4f1" stroke-opacity=".16"/>
  </g>
</svg>
